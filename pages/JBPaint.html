    <script>

        // Alright bro:
        /*

            1. Make two toolbars that are clickable;
            2. top one for export, etc
            3. left one for different draw commands

            4. Zoom out / in?
            5. Select an area to export?

            Icons from:

        // --------------------------- EVENT CAPTURE ---------------------------
        const CAPTURE_ALL_EVENTS = true;
        const eventTypes = [
            // Mouse
            // 'click', 'dblclick', 'mousedown', 'mouseup', 'mousemove', 'mouseenter', 'mouseleave', 'mouseover', 'mouseout',
            // Keyboard
            // 'keydown', 'keyup', 'keypress',
            // Form
            // 'submit', 'change', 'input', 'focus', 'blur',
            // Window
            // 'load', 'resize', 'scroll', 'unload',
            // Touch
            // 'touchstart', 'touchmove', 'touchend', 'touchcancel',
            // Drag
            // 'drag', 'dragstart', 'dragend', 'dragover', 'dragenter', 'dragleave', 'drop'
        ];
        eventTypes.forEach(eventType => {
            if (CAPTURE_ALL_EVENTS) {
                window.addEventListener(eventType, (e) => {
                    console.log(`Event: ${eventType}`, 'Target:', e.target, 'Event:', e);
                }, true); // true = capture phase, catches everything
            }
        });



        const coord = {
            // these may fail for nested svgs... I'm not sure yet.
            // returns from clientX, clientY to the coordinate system within the .svg file
            toSVG(screenX, screenY, svgElement) {
                const pt = svgElement.createSVGPoint();
                pt.x = screenX;
                pt.y = screenY;
                return pt.matrixTransform(svgElement.getScreenCTM().inverse());
            },
            // returns from inner-SVG coordinates to the screen
            fromSVG(svgX, svgY, svgElement) {
                const pt = svgElement.createSVGPoint();
                pt.x = svgX;
                pt.y = svgY;
                return pt.matrixTransform(svgElement.getScreenCTM());
            }
        }



        // m is the mouse state
        // x0 and y0 are the last place I clicked
        // via clientX, clientY 
        const m = {
            x0: 0,
            y0: 0
        }

        const draggableList = [];
        let dragging = false;
        // listeners has to be a list.
        // if we have multiple listeners that move the same group... we'll have different values for both.
        // or we can go through the target, get its kids, and update their values... let's do that for now.
        // nah, that doesn't work for groups of groups... temp solution.
        // we just have to give it multiple listeners.

        // so now, you can pass a single listener via string, or multiple in an array.
        function makeDraggable(listeners, target) {
            try {
                // console.log(typeof listeners);
                if (typeof listeners === 'string') {
                    listeners = [listeners];
                }

                const ls = [];
                listeners.forEach((l) => {
                    ls.push(document.getElementById(l));
                });
                const t = document.getElementById(target);

                draggableList.push({
                    listeners: ls,
                    target: t,
                    dragging: false,
                    x0: 0,
                    y0: 0
                });
                console.log(`Successfully registered draggable object(s) ([${listeners}], ${target})`);
            } catch (e) {
                console.error(`Failed to make draggable (${listeners}, ${target})`);
                console.error(e);
            }
        }

        makeDraggable(['FUNC-PAN_2', 'FUNC-PAN_3'], 'mainMenu');
        // makeDraggable('FUNC-PAN_3', 'mainMenu');


        // okay, given m.x and m.y, which contain the last mouse positions that we pressed
        // I need to make a way to stretch the window
        // (why? I guess I'm just exploring functionality...)
        //





        // store the xy position, say we're dragging
        function pressed(e) {
            console.log("Pressed");
            // console.log(document.elementsFromPoint(e.x, e.y));
            // console.log(document.elementFromPoint(e.x, e.y));

            dragging = true;

            // going to just drag all of them, fuck it.
            // not going to seperate the top layer from the ones beneath it.
            // If you wanted to, you could stuff 'elementFromPoint' in a list and follow the same logic.
            // that would make only the topmost element move.


            draggableList.forEach((o) => {
                // console.log("Checking ");
                // console.log(o);
                // not the fastest list comparison possible here...
                if (o.listeners.some((l) => document.elementsFromPoint(e.clientX, e.clientY).includes(l))) {
                    console.log("pressed on: ");
                    console.log(o);
                    dragging = true;
                    o.dragging = true;

                    m.x0 = e.clientX;
                    m.y0 = e.clientY;
                }
            });

            resizeX.forEach((o) => {
                //

                if (document.elementsFromPoint(e.clientX, e.clientY).includes(o.listener)) {
                    // console.log("Resizing mainMenu");
                    resizeXDown = true;
                    o.scaling = true;

                    m.x0 = e.clientX;
                    m.y0 = e.clientY;
                }
            });
        }
        function moved(e) {
            if (dragging) {
                // mouse distance from click origin (via clientX/Y)
                const dx = e.clientX - m.x0;
                const dy = e.clientY - m.y0;

                draggableList.filter((o) => o.dragging).forEach((o) => {
                    const x = o.x0 + dx;
                    const y = o.y0 + dy;
                    o.target.setAttribute("transform", `translate(${x}, ${y})`);
                });

                resizeX.filter((o) => o.scaling).forEach((o) => {


                    o.target.setAttribute("transform", `scale(${x}, ${y})`);
                })

            }
        }
        function released(e) {
            if (dragging) {
                // mouse distance from click origin (via clientX/Y)
                const dx = e.clientX - m.x0;
                const dy = e.clientY - m.y0;

                draggableList.filter((o) => o.dragging).forEach((o) => {
                    const x = o.x0 + dx;
                    const y = o.y0 + dy;
                    o.target.setAttribute("transform", `translate(${x}, ${y})`);

                    o.x0 = x;
                    o.y0 = y;
                });

                // just setting them all cuz f it.
                // seems to capture more undiscovered edge cases.
                draggableList.forEach((o) => {
                    o.dragging = false;
                });
            }

            if (resizeXDown) {
                resizeX.forEach((o) => {
                    o.scaling = false;
                });
            }

            dragging = false;
            resizeXDown = false;
        }



        window.addEventListener('mousedown', (e) => {
            console.log("mousedown");
            // console.log(e);
            pressed(e);
        });
        window.addEventListener('touchstart', (e) => {
            console.log("touchstart");
            // console.log(e);
            pressed(e);
        });


        window.addEventListener('mousemove', (e) => {
            // console.log("mousemove");
            // console.log(e);
            moved(e);
        });
        window.addEventListener('touchmove', (e) => {
            // console.log("touchmove");
            // console.log(e);
            moved(e);
        });


        window.addEventListener('mouseup', (e) => {
            console.log("mouseup");
            // console.log(e);
            released(e);
        });
        window.addEventListener('touchend', (e) => {
            console.log("touchend");
            // console.log(e);
            released(e);
        });





        // what is the math for... mouse dragged amount, mouse stays over the same pixel?
        // I guess, take l0 = (distance from anchor to click)
        // l1 = (distance from anchor to new mouse location)
        // scale by l1/l0
        // and then do I just set the local variable to that?

        const scale = {
            x: 1,
            y: 1
        };

        const resizeX = [];
        let resizeXDown = false;

        function makeResizeX(listener, target) {
            try {
                const l = document.getElementById(listener);
                const t = document.getElementById(target);

                // give it 
                resizeX.push({
                    listener: l,
                    target: t,
                    scaling: false,
                    l: 1,   // current length (in scale value)
                    l0: 0 // distance in clientX from anchor to pressedDown
                });

            } catch (error) {
                console.error(`Could not makeResizeX for ${l}, ${t}`);
                console.error(error);
            }
        }

        makeResizeX('FUNC-RESIZE-W', 'mainMenu');



        window.addEventListener('keydown', (e) => {
            console.log(`Key down. (keyCode, key) === ${e.keyCode}, ${e.key}`);
            // console.log(e);

            // 39 for right, 37 for left
            if (e.keyCode >= 35 && e.keyCode <= 43) e.preventDefault();
            if (e.keyCode === 39) {
                const mm = svg['mainMenu'];

                scale.x *= 1.1;
                mm.setAttribute('transform', `scale(${scale.x}, ${scale.y})`);
            }
            if (e.keyCode === 37) {

                const mm = svg['mainMenu'];

                scale.x /= 1.1;
                mm.setAttribute('transform', `scale(${scale.x}, ${scale.y})`);
            }
        });


        // Make them hover-visible:

        svg['mainMenu'].addEventListener('mouseenter', (e) => {
            //console.log("Entered");
            svg['HOVER'].classList.add('jshover');

            // console.log(e);
        });
        svg['mainMenu'].addEventListener('mouseleave', (e) => {
            // console.log("left");

            svg['HOVER'].classList.remove('jshover');
        });

        svg['FUNC-RECENTER'].addEventListener('mouseenter', (e) => {
            svg['VIS-RECENTER-HOVERED'].classList.add('jshover');
        });
        svg['FUNC-RECENTER'].addEventListener('mouseleave', (e) => {
            svg['VIS-RECENTER-HOVERED'].classList.remove('jshover');

        });



        // --------------------------- END EVENT CAPTURE ---------------------------





        // --------------------------- WINDOW AND DOM ---------------------------

        function fillScreen() {
            const w = window.innerWidth;

            // SVG is XML-based, so you need to use setAttribute() instead of direct property assignment.

            // const gh = document.getElementById('godhead');
            // console.log(gh);
            // gh.setAttribute('width', w);

        }

        // --------------------------- FUNCTIONAL ---------------------------

        // returns an svg element of type 'type' appended to the document.
        function makeSvg(type) {
            try {
                const s = document.createElementNS('http://www.w3.org/2000/svg', type);
                return s;
            } catch (error) {
                console.error("Failed to create a new SVG element of type " + type);
                console.error(error);
                return false;
            }
        }

        function addCircle(radius, x, y, color = "white") {

            const c = makeSvg('circle');
            c.setAttribute('cx', x);
            c.setAttribute('cy', y);
            c.setAttribute('r', radius);
            c.setAttribute('fill', color);

            const drawArea = document.getElementById('drawCanvas');
            drawArea.appendChild(c);

        }
