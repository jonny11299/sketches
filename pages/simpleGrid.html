    <!-- This one's sensitive, but it doesn't make use of 
    svg logic or dom elements or anything too much.

    I basically just need a quick screen of SVG elements that say 
    'draw, line, rect,' etc and can be wired to sense
    when they're clicked, and change state.

    Learning how to manage state.
    Speaking, trying to get sensory.
    -->
    <script>
        function launchDrawSketch() {
            console.log("Launching draw sketch:");




            const w = 800;
            const h = 800
            const bgcol = [230, 255, 230];

            function setup() {
                let canvas = createCanvas(w, h);
                canvas.parent('scriptHoldster')
                background(bgcol);

                console.log("Hello");
            }



            let grid = {
                rows: 4,
                cols: 5,

                // style: 
                strw: 3, // stroke weight
                strc: [0, 0, 0, 255], // stroke color, rgba

                hovc: [...bgcol.map((c) => c = c - 100)], // hover color, 100 units darker than bgcol


                p: function () {
                    // console.log("Running p");
                    const strc = this.strc;
                    stroke(strc);

                    const strw = this.strw;
                    strokeWeight(strw);

                    // print column borders
                    for (let r = 0; r < this.rows + 1; r++) {
                        const x = r * w / this.rows;
                        const y = [0, h];

                        line(x, y[0], x, y[1]);
                    }

                    // print row borders
                    for (let c = 0; c < this.cols + 1; c++) {
                        const x = [0, w];
                        const y = c * h / this.cols;

                        line(x[0], y, x[1], y);
                    }

                    console.log(this.hovc);
                },

                mouseMoved: function (x, y) {
                    // console.log(`Moved over ${x}, ${y}`);

                },


                onScreen: false,
                movedOffscreen: function () {
                    if (this.onScreen) {
                        this.justMovedOffscreen();
                    }
                    this.onScreen = false;
                },
                movedOnscreen: function () {
                    if (!this.onScreen) {
                        this.justMovedOnscreen();
                    }
                    this.onScreen = true;
                },
                justMovedOffscreen: function () {
                    console.log("Just Moved Off Screen");
                },
                justMovedOnscreen: function () {
                    console.log("Just Moved On Screen");

                }
            }



            // will run 10 frames before stopping
            const lock = 10;
            let curFrame = 0;

            function draw() {
                while (curFrame < lock) {
                    console.log("---------------------------------");
                    console.log("NewFrame");
                    console.log("---------------------------------");
                    grid.p();
                    // console.log("Tryna grid");

                    curFrame++;
                }

            }

            function windowResized() {
                let parent = documetn.getElementById('scriptHoldster');
                resizeCanvas(parent.offsetWidth, parent.offsetHeight);

            }

            function mouseMoved() {
                // console.log("Mobbin mouse");
                console.log(grid.onScreen);

                if (mouseX < 0 || mouseX > w || mouseY < 0 || mouseY > h) {
                    // moved offscreen
                    grid.movedOffscreen();

                } else {
                    grid.movedOnscreen();

                    grid.mouseMoved(mouseX, mouseY);
                }
            }


            window.setup = setup;
            window.draw = draw;
            window.mouseMoved = mouseMoved;
        }
    </script>
