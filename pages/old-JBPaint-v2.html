        const PANNING_ELEMENTS = [svg['FUNC-PAN_2'], svg['FUNC-PAN_3']];
        PANNING_ELEMENTS.forEach((p) => {
            p.addEventListener('mousedown', (e) => {
                drag.dragging = true;

                console.log("Dragstart");
                const m = svg['mainMenu'];
                drag.x0 = parseFloat(m.getAttribute('x'));
                drag.y0 = parseFloat(m.getAttribute('y'));
                drag.x1 = e.clientX;
                drag.y1 = e.clientY;
            });
            p.addEventListener('mousemove', (e) => {
                if (drag.dragging) {
                    // console.log("Dragging");
                    // dragging
                    // set my whole group to its original position (x0, y0) plus the diff between p2 - p1
                    drag.x2 = e.clientX;
                    drag.y2 = e.clientY;

                    const dx = drag.x2 - drag.x1;
                    const dy = drag.y2 - drag.y1;

                    const m = svg['mainMenu'];
                    m.setAttribute('transform', `translate(${dx}, ${dy})`);

                    // drag.x1 = drag.x2;

            });
            p.addEventListener('mouseup', (e) => {
                drag.dragging = false;
                console.log("Dropped");
                // dropped
                drag.x2 = e.x;
                drag.y2 = e.y;
            });
        });

        const coord = {
            // these may fail for nested svgs... I'm not sure yet.
            // returns from clientX, clientY to the coordinate system within the .svg file
            toSVG(screenX, screenY, svgElement) {
                const pt = svgElement.createSVGPoint();
                pt.x = screenX;
                pt.y = screenY;
                return pt.matrixTransform(svgElement.getScreenCTM().inverse());
            },
            // returns from inner-SVG coordinates to the screen
            fromSVG(svgX, svgY, svgElement) {
                const pt = svgElement.createSVGPoint();
                pt.x = svgX;
                pt.y = svgY;
                return pt.matrixTransform(svgElement.getScreenCTM());
            }
        }

        // --------------------------- FUNCTIONAL ---------------------------

        // returns an svg element of type 'type' appended to the document.
        function makeSvg(type) {
            try {
                const s = document.createElementNS('http://www.w3.org/2000/svg', type);
                return s;
            } catch (error) {
                console.error("Failed to create a new SVG element of type " + type);
                console.error(error);
                return false;
            }
        }

        function addCircle(radius, x, y, color = "white") {

            const c = makeSvg('circle');
            c.setAttribute('cx', x);
            c.setAttribute('cy', y);
            c.setAttribute('r', radius);
            c.setAttribute('fill', color);

            const drawArea = document.getElementById('drawCanvas');
            drawArea.appendChild(c);
