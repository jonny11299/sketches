    <script>

        const state = {
            toolSelected: 'circle',
            strokeWeight: 4,
            strokeWeightProportional: true,// makes strokeWeight interpreted by the painter as proportional to size. 
            // so the actual strokeWeight becomes: strokeWeight * size * constant factor.
            size: 50,
            stroke: 'rgb(0, 0, 0)',
            fill: 'rgb(200, 200, 255)',

        };

        // run on startup:
        setTimeout(() => {

        }, 1);



        // button functions:

        function selectCircle() {
            state.toolSelected = 'circle';
        }
        function selectSquare() {
            state.toolSelected = 'square';
        }
        function printState() {
            console.log(state);
        }
        function printPaintGroup() {
            console.log(document.getElementById('paintGroup').children);
        }


        const scaleFactor = 1.1;
        function scaleUp() {
            state.size *= scaleFactor;
        }
        function scaleDown() {
            state.size /= scaleFactor;
        }
        function strokeWeightUp() {
            state.strokeWeight *= scaleFactor;
        }
        function strokeWeightDown() {
            state.strokeWeight /= scaleFactor;
        }
        function toggleStrokeWeightProportional() {
            state.strokeWeightProportional = !state.strokeWeightProportional;
        }

        // FEATURE!!! could eventually let people browse through this stack and recover lost work.
        // (In essence, save the redoStack when erased.)
        let redoStack = [];
        function undo() {
            try {
                const shapes = document.getElementById('paintGroup').children;
                if (shapes.length > 0) {
                    // builds the redo stack
                    // console.log("Setting up to queue up", shapes[shapes.length - 1]);
                    redoStack.push(shapes[shapes.length - 1]);

                    // builds a new list, stopping short by 1 operation
                    // erases the old list, builds it anew

                    const newShapes = [];
                    for (let i = 0; i < shapes.length - 1; i++) {
                        newShapes.push(shapes[i]);
                    }

                    // pushes the elements back onto the paintGroup
                    const pg = document.getElementById('paintGroup');
                    pg.innerHTML = '';
                    newShapes.forEach((shape) => {
                        pg.appendChild(shape);
                    });

                }
            } catch (error) {
                console.error("Error on undo. Is shapes not an array?");
                console.error(error);
            }
        }
        function redo() {
            try {
                if (redoStack.length > 0) {
                    const s = redoStack.pop();
                    if (s) {
                        // console.log("Redoing and placing: ", s);
                        document.getElementById('paintGroup').appendChild(s);
                    }
                }
            } catch (error) {
                console.error("Error on redo.");
                console.error(error);
            }
        }



        // Helper functions:

        // Converts a point from client coordinates to svg coordinates
        function toSVG(clientX, clientY, svgElement = document.getElementById('viewBox')) {
            const pt = svgElement.createSVGPoint();
            pt.x = clientX;
            pt.y = clientY;
            return pt.matrixTransform(svgElement.getScreenCTM().inverse());
        }

        // returns an svg element of type 'type' appended to the document.
        function makeSVG(type) {
            try {
                const s = document.createElementNS('http://www.w3.org/2000/svg', type);
                return s;
            } catch (error) {
                console.error("Failed to create a new SVG element of type " + type);
                console.error(error);
                return false;
            }
        }


        function getErrorCursor() {
            const s = makeSVG('circle');
            const r = state.size / 2;
            s.setAttribute('cx', '0');
            s.setAttribute('cy', '0');
            s.setAttribute('r', `500`);

            s.setAttribute('stroke', `pink`);
            s.setAttribute('stroke-width', `20`);
            s.setAttribute('fill', `red`);

            return s;
        }


        function makeShapeFromState() {
            // makes a shape centered at 0, 0 and returns it
            let s;
            if (state.toolSelected === 'circle') {
                s = makeSVG('circle');
                const r = state.size / 2;
                s.setAttribute('cx', '0');
                s.setAttribute('cy', '0');
                s.setAttribute('r', `${r}`);

            } else if (state.toolSelected === 'square') {
                s = makeSVG('rect');
                const size = state.size;
                const offset = - size / 2;
                s.setAttribute('x', `${offset}`);
                s.setAttribute('y', `${offset}`);
                s.setAttribute('width', `${size}`);
                s.setAttribute('height', `${size}`);
            } else {
                return getErrorCursor();
            }

            s.setAttribute('stroke', `${state.stroke}`);
            const stroke_width = state.strokeWeightProportional ?
                state.strokeWeight * state.size / 50 : state.strokeWeight;
            s.setAttribute('stroke-width', `${stroke_width}`);
            s.setAttribute('fill', `${state.fill}`);

            return s;
        }

        function makePreviewShape() {
            // makes a shape centered at 0, 0 of size 50 and return it
            // container size is width=100
            let s = makeShapeFromState();
            const scaleSize = 50 / state.size;
            s.setAttribute('transform', `translate(50, 50) scale(${scaleSize},${scaleSize})`);

            return s;
        }


        let curSerialNumber = 0;
        function idGen() {
            curSerialNumber++;
            return `shape${curSerialNumber}`;
        }

        function placeCursorShape(clientX, clientY) {
            redoStack = [];
            const curs = document.getElementById('activeCursor');
            if (!curs) {
                console.error("No cursor shape available for placeCursorShape() !!");
            } else {
                const newShape = makeShapeFromState();

                newShape.id = idGen();
                console.log(`Placed ${newShape.id}`);

                const pt = toSVG(clientX, clientY);
                newShape.setAttribute('transform', `translate(${pt.x}, ${pt.y})`);

                document.getElementById('paintGroup').appendChild(newShape);
            }
        }

        // Implement cursor functionality (hovering over the canvas) 

        const cursorGroup = document.getElementById('cursorGroup');
        document.getElementById('viewBox').addEventListener('mousemove', (e) => {
            // console.log("Now you done it");

            const pt = toSVG(e.clientX, e.clientY);
            cursorGroup.setAttribute('transform', `translate(${pt.x}, ${pt.y})`);
        });

        // we can do this because we can guarantee that every time
        // we select a new tool, we'll leave the window
        // thus erasing and allowing us to re-create the shape.
        // That is, unless we implement keyboard usage / hotkeys
        document.getElementById('viewBox').addEventListener('mouseenter', (e) => {
            // add the correct cursor preview in at 0, 0:

            const newCursor = makeShapeFromState();
            newCursor.id = 'activeCursor';
            cursorGroup.appendChild(newCursor);
        });

        document.getElementById('viewBox').addEventListener('mouseleave', (e) => {
            // console.log("leave");

            // Remove all cursor previews:
            cursorGroup.innerHTML = '';
        });

        document.getElementById('viewBox').addEventListener('click', (e) => {
            // console.log("Clicked");

            // attempt to add cursor to image
            if (true) {
                placeCursorShape(e.clientX, e.clientY);
            }
        });

        const logElementsAtClick = false;
        if (logElementsAtClick) {
            document.addEventListener('click', (e) => {
                console.log("Elements at click:");
                console.log(document.elementsFromPoint(e.clientX, e.clientY));
            });
        }

        // add an event listener to the tool window to update the preview:

        let previewShape;
        function updatePreviewState() {
            // console.log("Clicked tool container");
            previewShape = makePreviewShape();
            previewShape.id = 'previewShapeActual';
            document.getElementById('previewShapeGroup').innerHTML = '';
            document.getElementById('previewShapeGroup').appendChild(previewShape);
        }
        document.getElementById('toolContainer').addEventListener('click', (e) => {
            updatePreviewState();
        });
        // run on launch:
        updatePreviewState();

    </script>
