        // --------------------------- WINDOW AND DOM ---------------------------

        function fillScreen() {
            const w = window.innerWidth;
            const h = window.innerHeight;

            // SVG is XML-based, so you need to use setAttribute() instead of direct property assignment.
            // and getAttribute()
            const gh = document.getElementById('godhead');
            // console.log(gh);
            gh.setAttribute('width', w);
            gh.setAttribute('height', h);

            // Hey bro if you're ever like "omg there's still whitespace", it's your bod:

        // --------------------------- EVENT CAPTURE ---------------------------
        const CAPTURE_ALL_EVENTS = true;
        const eventTypes = [
            // Mouse
            // 'click', 'dblclick', 'mousedown', 'mouseup', 'mousemove', 'mouseenter', 'mouseleave', 'mouseover', 'mouseout',

            // Drag

        ];
        eventTypes.forEach(eventType => {
            if (CAPTURE_ALL_EVENTS) {
                window.addEventListener(eventType, (e) => {
                    console.log(`Event: ${eventType}`, 'Target:', e.target, 'Event:', e);
                }, true); // true = capture phase, catches everything
            }
        });



        function pressed(e) {
            addCircle(50, e.x, e.y);
        }


        window.addEventListener('click', (e) => {
            console.log("Clicked");
            console.log(e);
            pressed(e);

        window.addEventListener('touchstart', (e) => {

        window.addEventListener('keydown', (e) => {

        })
        // --------------------------- END EVENT CAPTURE ---------------------------



        // --------------------------- FUNCTIONAL ---------------------------

        // returns an svg element of type 'type' appended to the document.
        function svg(type) {
            try {
                const s = document.createElementNS('http://www.w3.org/2000/svg', type);
                return s;
            } catch (error) {
                console.error("Failed to create a new SVG element of type " + type);
                console.error(error);
                return false;
            }
        }

        function addCircle(radius, x, y, color = "white") {

            const c = svg('circle');
            c.setAttribute('cx', x);
            c.setAttribute('cy', y);
            c.setAttribute('r', radius);
            c.setAttribute('fill', color);

            const drawArea = document.getElementById('drawCanvas');
            drawArea.appendChild(c);

        }


        const jsrect = svg('rect');
        jsrect.setAttribute('x', "150");
        jsrect.setAttribute('y', "150");
        jsrect.setAttribute('width', "200");
        jsrect.setAttribute('height', '50');
        jsrect.setAttribute("fill", "green");
        jsrect.setAttribute("id", "jsrect");
        jsrect.setAttribute("pressedOn", "false");
        document.getElementById("godhead").appendChild(jsrect);

        document.addEventListener("click", (e) => {
            console.log(document.elementsFromPoint(e.clientX, e.clientY));
        });


        // mouseclicked
        const mc = {
            x: 0,
            y: 0,
            down: false
        };

        document.addEventListener("mousedown", (e) => {
            // console.log("Mousedown");
            mc.x = e.clientX;
            mc.y = e.clientY;
            mc.down = true;

            if (document.elementsFromPoint(e.clientX, e.clientY).includes(jsrect)) {
                jsrect.setAttribute("pressedOn", "true");
            }

        });

        document.addEventListener("mousemove", (e) => {
            // console.log("Mousemove");

            if (jsrect.getAttribute("pressedOn") === "true") {
                console.log("Dragging");

                const x = jsrect.getAttribute('x');
                const y = jsrect.getAttribute('y');
                const w = jsrect.getAttribute('width');
                const h = jsrect.getAttribute('height');

                const newwidth = 200 + e.clientX - mc.x;
                jsrect.setAttribute("width", newwidth);
            };

        });
        document.addEventListener("mouseup", (e) => {
            // console.log("Mouseup");

            jsrect.setAttribute("pressedOn", "false");
            mc.down = false;
        });





        // okay so this would be the prototype for a scalable, draggable object.

        // anchor point and click point for scaleX

        // anchor point and click point for scaleX, scaleY 

        // so interesting; when transforming, you have to assign both at once.
        // that is, setAttribute("transform", "scale(1.1, 1)") will knock out your translate(100, 100).


        const scalableWindow = {
            m: {

            },
